version: "2"

run:
  timeout: 5m
  tests: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

linters:
  default: none
  enable:
    # Correctness
    - errcheck
    - govet
    - staticcheck
    - nilerr
    - bodyclose
    - rowserrcheck
    - sqlclosecheck
    # Context
    - noctx
    - contextcheck
    # Style / Quality
    - revive
    - gocritic
    - misspell
    - whitespace
    - godot
    # Dead code
    - ineffassign
    - unused
    - unparam
    # Safety
    - gosec
    - gochecknoglobals
    # Complexity
    - cyclop
    - gocognit
    # Completeness
    - exhaustive
    - nolintlint
    # Performance
    - perfsprint
    - intrange

  exclusions:
    paths:
      - docs              # auto-generated swagger docs
      - infra/sqlite/db   # sqlc-generated code
    rules:
      - path: '_test\.go'
        linters: [bodyclose, errcheck, noctx, wrapcheck]
      # Auto-generated swagger docs — swaggo uses a non-standard generated header
      # that golangci-lint does not recognise, so suppress by error text.
      - text: 'SwaggerInfo is a global variable'
        linters: [gochecknoglobals]
      - text: 'SwaggerInfo holds exported Swagger Info'
        linters: [godot]
      # Package names "user" (conflicts with os/user) and "metrics" (conflicts with
      # runtime/metrics) are intentional domain names; suppress revive var-naming.
      - text: 'avoid package names that conflict with Go standard library package names'
        linters: [revive]

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    govet:
      enable-all: true
      disable: [fieldalignment]
      settings:
        shadow:
          strict: true
    staticcheck:
      checks: ["all", "-ST1000", "-ST1003"]
    revive:
      rules:
        - name: exported
          arguments: ["checkPrivateReceivers", "sayRepetitiveInsteadOfStutters"]
        - name: error-strings
        - name: context-as-argument
        - name: errorf
        - name: if-return
        - name: receiver-naming
        - name: var-naming
    godot:
      exclude:
        - '^\s*@'  # swag annotations; a trailing period would break the parser
    cyclop:
      max-complexity: 15
      package-average: 10.0
    gocognit:
      min-complexity: 15
    exhaustive:
      check: [switch, map]
      default-signifies-exhaustive: false
    nolintlint:
      require-explanation: true
      require-specific: true
    gosec:
      excludes: [G115] # integer overflow — too noisy for small projects
